<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسانه هنری قمر | رزرو تبلیغات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #fdfbf7; --milk: #f5efe6; --gold: #c8af93;
      --brown: #8b6f4e; --dark: #3e2c1c; --text: #5c4a3a; --white: #fff;
      --red: #e74c3c;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #fdfbf7, #f5efe6);
      color: var(--text); min-height: 100vh;
    }
    .header {
      background: var(--white); padding: 14px 20px; display: flex;
      align-items: center; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      justify-content: space-between;
    }
    .header-back { color: var(--brown); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-logo-small { display: flex; align-items: center; gap: 8px; }
    .header-logo-small img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .header-logo-small span { font-weight: 700; color: var(--dark); font-size: 16px; }
    .container { max-width: 500px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    .icon-circle {
      width: 100px; height: 100px; background: #fdf0ee; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;
    }
    .icon-circle i { font-size: 48px; color: var(--red); }
    h2 { color: var(--dark); margin-bottom: 8px; }
    p { color: #a08b73; font-size: 14px; line-height: 1.8; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 24px;
      padding: 12px 28px; background: var(--brown); color: #fff;
      border-radius: 12px; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="menu.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-logo-small">
      <img src="https://cdn.imgurl.ir/uploads/n606537_IMG_20260618_122029_787.jpg" alt="لوگو">
      <span>رسانه هنری قمر</span>
    </div>
    <div style="width:60px;"></div>
  </header>

  <div class="container">
    <div class="icon-circle"><i class="fa-solid fa-ad"></i></div>
    <h2>به زودی...</h2>
    <p>بخش رزرو تبلیغات به زودی راه‌اندازی می‌شود.<br>از شکیبایی شما سپاسگزاریم.</p>
    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-right"></i> بازگشت به منو</a>
  </div>
</body>
</html>

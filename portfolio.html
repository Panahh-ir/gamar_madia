<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسانه هنری قمر | نمونه کارها</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #fdfbf7; --milk: #f5efe6; --gold: #c8af93;
      --brown: #8b6f4e; --dark: #3e2c1c; --text: #5c4a3a; --white: #fff; --purple: #8e44ad;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #fdfbf7, #f5efe6);
      color: var(--text); min-height: 100vh;
    }
    .header {
      background: var(--white); padding: 14px 20px; display: flex;
      align-items: center; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header-back { color: var(--brown); font-size: 14px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .header-logo-small { display: flex; align-items: center; gap: 8px; }
    .header-logo-small img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .header-logo-small span { font-weight: 700; color: var(--dark); font-size: 16px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
    h2 { text-align: center; color: var(--dark); margin-bottom: 20px; font-size: 20px; }
    h2 i { color: #8e44ad; margin-left: 8px; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .portfolio-card {
      background: var(--white); border-radius: 12px; overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.04); transition: all 0.3s; cursor: pointer;
    }
    .portfolio-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
    .portfolio-card img { width: 100%; height: 180px; object-fit: cover; }
    .portfolio-card .info { padding: 12px 14px; }
    .portfolio-card h3 { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .portfolio-card p { font-size: 11px; color: #a08b73; }
    .empty-state { text-align: center; padding: 60px 20px; color: #b8a48e; grid-column: 1 / -1; }
    .empty-state i { font-size: 56px; margin-bottom: 14px; display: block; }
    @media (max-width: 992px) { .portfolio-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; } .portfolio-card img { height: 160px; } }
    @media (max-width: 768px) { .portfolio-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } .portfolio-card img { height: 140px; } .portfolio-card .info { padding: 10px 12px; } }
    @media (max-width: 400px) { .portfolio-grid { gap: 8px; } .portfolio-card img { height: 120px; } }
  </style>
</head>
<body>
  <header class="header">
    <a href="mypage.html" class="header-back"><i class="fa-solid fa-arrow-right"></i> بازگشت</a>
    <div class="header-logo-small">
      <img src="https://cdn.imgurl.ir/uploads/n606537_IMG_20260618_122029_787.jpg" alt="لوگو">
      <span>رسانه هنری قمر</span>
    </div>
    <div style="width:60px;"></div>
  </header>

  <div class="container">
    <h2><i class="fa-solid fa-palette"></i> نمونه کارها</h2>
    <div class="portfolio-grid" id="portfolioGrid">
      <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>در حال بارگذاری...</p></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwBVFp23ysijQCOHlc_0z7LmRCAMfWrLO9AXaja93qpbYXg_8hWEbYk4ipXs8YeI1dLhw/exec';
    
    async function loadPortfolio() {
      try {
        const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'getPortfolios', role:'visitor', username:'' }) });
        const d = await res.json();
        const grid = document.getElementById('portfolioGrid');
        if (d.result==='success' && d.data.portfolios.length) {
          grid.innerHTML = d.data.portfolios.map(p => `
            <div class="portfolio-card">
              <img src="${p.image_url}" alt="${p.title}" onerror="this.src='https://cdn.imgurl.ir/uploads/n606537_IMG_20260618_122029_787.jpg'">
              <div class="info">
                <h3>${p.title}</h3>
                <p>${p.description || ''}</p>
              </div>
            </div>`).join('');
        } else {
          grid.innerHTML = '<div class="empty-state"><i class="fa-solid fa-palette"></i><p>هنوز نمونه کاری ثبت نشده است</p></div>';
        }
      } catch(e) {
        grid.innerHTML = '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>خطا در بارگذاری</p></div>';
      }
    }
    loadPortfolio();
  </script>
</body>
</html>

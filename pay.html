<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رسانه هنری قمر | پرداخت</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #fdfbf7;
      --milk: #f5efe6;
      --beige: #ede4d8;
      --gold: #c8af93;
      --brown: #8b6f4e;
      --dark: #3e2c1c;
      --text: #5c4a3a;
      --white: #ffffff;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--white);
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      padding: 14px 20px;
      text-align: center;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    .pay-container {
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
      text-align: center;
    }

    .pay-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    }

    .pay-icon {
      width: 80px;
      height: 80px;
      background: #eafaf1;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
    }

    .pay-icon i {
      font-size: 36px;
      color: #27ae60;
    }

    .pay-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .pay-subtitle {
      font-size: 14px;
      color: #a08b73;
      margin-bottom: 20px;
    }

    .product-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--brown);
      margin-bottom: 24px;
      padding: 12px;
      background: var(--milk);
      border-radius: 10px;
    }

    .btn-back-menu {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(145deg, var(--brown), #6d553b);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-back-menu:hover {
      background: linear-gradient(145deg, #7d6343, #5e4932);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title">رسانه هنری قمر</div>
  </header>

  <div class="pay-container">
    <div class="pay-card">
      <div class="pay-icon">
        <i class="fa-solid fa-credit-card"></i>
      </div>
      <h1 class="pay-title">بخش پرداخت</h1>
      <p class="pay-subtitle">این بخش به زودی راه‌اندازی می‌شود</p>
      <div class="product-name" id="productNameDisplay">---</div>
      <a href="menu.html" class="btn-back-menu">
        <i class="fa-solid fa-arrow-right"></i>
        بازگشت به منوی محصولات
      </a>
    </div>
  </div>

  <script>
    const productName = localStorage.getItem('qm_buy_product_name');
    if (productName) {
      document.getElementById('productNameDisplay').textContent = 'محصول: ' + productName;
    }
  </script>
</body>
</html>
